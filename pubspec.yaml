name: taskmate
description: "TaskMate – Your smart productivity & collaboration companion."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_image_compress: ^2.3.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Local DB (offline tasks)
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # State management
  provider: ^6.1.5

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1

  # Media
  image_picker: ^1.1.2

  # Utilities
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.3
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/taskmateicon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800